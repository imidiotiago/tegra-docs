<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="tegra-icon-title">
  <title id="tegra-icon-title">Tegra Icon</title>
  <defs>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369A1" />
      <stop offset="100%" style="stop-color:#0284C7" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#icon-grad)" />

  <!-- Shield silhouette -->
  <path d="M32,10 L50,18 L50,34 C50,44 42,51 32,55 C22,51 14,44 14,34 L14,18 Z"
    fill="#FFFFFF" opacity="0.15" />

  <!-- Network nodes — federation -->
  <circle cx="32" cy="26" r="5" fill="#FFFFFF" opacity="0.95" />
  <circle cx="21" cy="38" r="3.5" fill="#FFFFFF" opacity="0.7" />
  <circle cx="43" cy="38" r="3.5" fill="#FFFFFF" opacity="0.7" />

  <!-- Connections -->
  <line x1="32" y1="31" x2="21" y2="35" stroke="#FFFFFF" stroke-width="1.8" opacity="0.5" />
  <line x1="32" y1="31" x2="43" y2="35" stroke="#FFFFFF" stroke-width="1.8" opacity="0.5" />
  <line x1="21" y1="38" x2="43" y2="38" stroke="#FFFFFF" stroke-width="1.5" opacity="0.35" />

  <!-- Green badge -->
  <circle cx="46" cy="16" r="8" fill="#16A34A" />
  <path d="M42,16 L45,19 L50.5,13" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
</svg>
