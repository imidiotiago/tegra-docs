<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-labelledby="tegra-title tegra-desc">
  <title id="tegra-title">Tegra Logo</title>
  <desc id="tegra-desc">Logo da plataforma Tegra de gestão federada de seguros</desc>
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369A1" />
      <stop offset="100%" style="stop-color:#0284C7" />
    </linearGradient>
  </defs>

  <!-- Shield icon — security + protection -->
  <g id="icon" transform="translate(4, 4)">
    <!-- Shield shape -->
    <path d="M28,2 L50,12 L50,30 C50,42 40,50 28,54 C16,50 6,42 6,30 L6,12 Z"
      fill="url(#shield-grad)" />
    <!-- Network nodes inside shield — federation/integration -->
    <circle cx="28" cy="22" r="4" fill="#FFFFFF" opacity="0.95" />
    <circle cx="18" cy="34" r="3" fill="#FFFFFF" opacity="0.75" />
    <circle cx="38" cy="34" r="3" fill="#FFFFFF" opacity="0.75" />
    <!-- Connection lines -->
    <line x1="28" y1="26" x2="18" y2="31" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6" />
    <line x1="28" y1="26" x2="38" y2="31" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6" />
    <line x1="18" y1="34" x2="38" y2="34" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4" />
    <!-- Green accent check — trust -->
    <circle cx="42" cy="12" r="7" fill="#16A34A" />
    <path d="M38.5,12 L41,14.5 L45.5,9.5" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Wordmark -->
  <text x="72" y="43" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="700" fill="#0C4A6E" letter-spacing="-0.5">
    Tegra
  </text>

  <!-- Tagline -->
  <text x="73" y="58" font-family="Inter, system-ui, sans-serif" font-size="9.5" font-weight="400" fill="#64748B" letter-spacing="2.5">
    GESTÃO FEDERADA DE SEGUROS
  </text>
</svg>
